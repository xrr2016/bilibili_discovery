<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bilibili Discovery</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="app">
      <h1>Bilibili Discovery</h1>
      <div class="actions">
        <button id="btn-update-up">更新关注</button>
        <button id="btn-auto-classify">自动分类</button>
        <button id="btn-stats">查看统计</button>
        <button id="btn-settings">设置</button>
      </div>
      <div class="section">
        <h2>状态</h2>
        <div class="status-list">
          <div class="status-item">
            <span>用户UID</span>
            <span id="status-user-id">-</span>
          </div>
          <div class="status-item">
            <span>UP缓存更新</span>
            <span id="status-up-update">-</span>
          </div>
          <div class="status-item">
            <span>分类更新时间</span>
            <span id="status-classify-update">-</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
