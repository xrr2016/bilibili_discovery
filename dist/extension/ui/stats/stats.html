<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bilibili Discovery Stats</title>
    <link rel="stylesheet" href="./stats.css" />
  </head>
  <body>
    <div class="app">
      <h1>统计信息</h1>
      <div class="layout">
        <div class="panel">
          <h2>关注UP</h2>
          <div id="up-list" class="up-list"></div>
          <div class="filter-area">
            <div class="filter-section">
              <h3>筛选条件</h3>
              <div class="filter-zones">
                <div class="filter-zone filter-include">
                  <h4>必须包含</h4>
                  <div id="filter-include-tags" class="filter-tags"></div>
                </div>
                <div class="filter-zone filter-exclude">
                  <h4>不能包含</h4>
                  <div id="filter-exclude-tags" class="filter-tags"></div>
                </div>
              </div>
              <div class="filter-actions">
                <button id="btn-apply-filter" class="action">应用筛选</button>
                <button id="btn-clear-filter" class="secondary">清除筛选</button>
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="cards">
            <div class="card">
              <span class="label">关注UP数量</span>
              <span id="stat-up-count" class="value">-</span>
            </div>
            <div class="card">
              <span class="label">UP分类词条数</span>
              <span id="stat-tag-count" class="value">-</span>
            </div>
            <div class="card">
              <span class="label">视频数量</span>
              <span id="stat-video-count" class="value">-</span>
            </div>
          </div>
          <div class="section">
            <h2>UP分类词条</h2>
            <div class="search-box">
              <input id="tag-search" type="text" placeholder="搜索标签..." />
            </div>
            <div id="tag-list" class="list tag-list-scrollable"></div>
            <button id="btn-clear-classify" class="danger">清理分类数据</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./stats.js"></script>
  </body>
</html>
