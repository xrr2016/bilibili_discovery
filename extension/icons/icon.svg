<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00AEEC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B5E5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" />

  <!-- TV icon -->
  <rect x="24" y="36" width="80" height="56" rx="8" fill="white" />
  <rect x="28" y="40" width="72" height="48" rx="4" fill="#00AEEC" />

  <!-- TV stand -->
  <rect x="56" y="92" width="16" height="12" rx="2" fill="white" />
  <rect x="48" y="100" width="32" height="4" rx="2" fill="white" />

  <!-- Play button -->
  <polygon points="56,52 56,76 76,64" fill="white" />

  <!-- Stars decoration -->
  <circle cx="96" cy="40" r="4" fill="white" opacity="0.8" />
  <circle cx="32" cy="80" r="3" fill="white" opacity="0.6" />
  <circle cx="100" cy="76" r="2" fill="white" opacity="0.5" />
</svg>