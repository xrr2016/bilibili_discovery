<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩测试 - Bilibili Discovery</title>
    <link rel="stylesheet" href="./image-compress.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
            <path d="M12 12v9"/>
            <path d="m16 16-4-4-4 4"/>
          </svg>
        </div>
        <h1>图片压缩测试</h1>
        <p class="subtitle">扫描并压缩数据库中的视频封面图片</p>
      </div>

      <div class="content">
        <div class="section">
          <h2 class="section-title">压缩设置</h2>
          <div class="form-group">
            <label class="form-label">
              <span class="label-text">平台</span>
              <select id="platform" class="form-input">
                <option value="bilibili">Bilibili</option>
                <option value="youtube">YouTube</option>
              </select>
            </label>
            <p class="form-hint">选择要压缩图片的视频平台</p>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">压缩进度</h2>
          <div class="progress-container">
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="progress-text">
              <span id="progress-status">等待开始...</span>
              <span id="progress-percent">0%</span>
            </div>
          </div>
          <div class="stats">
            <div class="stat-item">
              <div class="stat-label">已处理</div>
              <div id="processed-count" class="stat-value">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">总数</div>
              <div id="total-count" class="stat-value">0</div>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">操作</h2>
          <div class="button-group">
            <button id="start-btn" class="btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              开始压缩
            </button>
            <button id="stop-btn" class="btn-secondary" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
              </svg>
              停止
            </button>
          </div>
        </div>
      </div>

      <div class="footer">
        <p id="status" class="status"></p>
      </div>
    </div>
    <script type="module" src="./image-compress.ts"></script>
  </body>
</html>
