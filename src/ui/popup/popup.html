<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili Discovery</title>
    <link rel="stylesheet" href="./popup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="logo">
          <i class="fab fa-bilibili"></i>
          <h1>Bilibili Discovery</h1>
        </div>
      </div>

      <div class="actions">
        <button id="btn-update-up" class="btn-primary">
          <i class="fas fa-sync-alt"></i>
          <span>更新关注</span>
        </button>
        <button id="btn-auto-classify" class="btn-accent">
          <i class="fas fa-layer-group"></i>
          <span class="btn-content">
            <span id="classify-button-title">自动分类</span>
            <span id="classify-button-detail">抓取UP页面并生成可编辑标签</span>
          </span>
          <span id="classify-button-count" class="btn-count">开始</span>
          <span id="classify-button-fill" class="btn-progress-fill"></span>
        </button>
        <button id="btn-random-up" class="btn-secondary">
          <i class="fas fa-random"></i>
          <span>随机UP</span>
        </button>
        <button id="btn-stats" class="btn-info">
          <i class="fas fa-chart-bar"></i>
          <span>查看UP</span>
        </button>
        <button id="btn-watch-stats" class="btn-watch">
          <i class="fas fa-stopwatch"></i>
          <span>观看统计</span>
        </button>
        <button id="btn-settings" class="btn-neutral">
          <i class="fas fa-cog"></i>
          <span>设置</span>
        </button>
      </div>

      <div class="section">
        <h2><i class="fas fa-info-circle"></i> 状态</h2>
        <div class="status-list">
          <div class="status-item">
            <div class="status-label">
              <i class="fas fa-user"></i>
              <span>用户UID</span>
            </div>
            <span id="status-user-id" class="status-value">-</span>
          </div>
          <div class="status-item">
            <div class="status-label">
              <i class="fas fa-database"></i>
              <span>UP缓存更新</span>
            </div>
            <span id="status-up-update" class="status-value">-</span>
          </div>
          <div class="status-item">
            <div class="status-label">
              <i class="fas fa-tags"></i>
              <span>分类更新时间</span>
            </div>
            <span id="status-classify-update" class="status-value">-</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
