<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili Discovery</title>
    <link rel="stylesheet" href="./popup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="logo">
          <i class="fab fa-bilibili"></i>
          <h1>Bilibili Discovery</h1>
        </div>
      </div>

      <div class="actions">
        <button id="btn-stats" type="button" class="btn-info" role="button">
          <i class="fas fa-chart-bar"></i>
          <span>查看UP</span>
        </button>
        <!-- 测试工具按钮 - 已注释 -->
        <!-- <button id="btn-watch-stats" type="button" class="btn-watch" role="button">
          <i class="fas fa-stopwatch"></i>
          <span>测试工具</span>
        </button> -->
        <button id="btn-favorites" type="button" class="btn-favorite" role="button">
          <i class="fas fa-heart"></i>
          <span>收藏视频</span>
        </button>
        <!-- 兴趣分析按钮 - 已注释 -->
        <!-- <button id="btn-interest-stats" type="button" class="btn-interest" role="button">
          <i class="fas fa-chart-pie"></i>
          <span>兴趣分析</span>
        </button> -->
        <button id="btn-theme-settings" type="button" class="btn-primary" role="button">
          <i class="fas fa-palette"></i>
          <span>主题设置</span>
        </button>
        <button id="btn-database-stats" type="button" class="btn-info" role="button">
          <i class="fas fa-database"></i>
          <span>数据库统计</span>
        </button>
        <button id="btn-settings" type="button" class="btn-neutral" role="button">
          <i class="fas fa-cog"></i>
          <span>设置</span>
        </button>
      </div>

      <div class="section">
        <h2><i class="fas fa-info-circle"></i> 状态</h2>
        <div class="status-list">
          <div class="status-item">
            <div class="status-label">
              <i class="fas fa-user"></i>
              <span>用户UID</span>
            </div>
            <span id="status-user-id" class="status-value">-</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
