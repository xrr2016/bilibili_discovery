<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试工具 - Bilibili Discovery</title>
  </head>
  <body>
    <h1>测试工具</h1>

    <h2>图片压缩</h2>
    <div>
      <label>
        平台：
        <select id="platform">
          <option value="bilibili">Bilibili</option>
          <option value="youtube">YouTube</option>
        </select>
      </label>
      <button id="start-compress-btn">开始压缩</button>
      <button id="stop-compress-btn" disabled>停止</button>
    </div>
    <div>
      <span>进度：</span>
      <span id="compress-status">等待开始...</span>
      <span id="compress-percent">0%</span>
    </div>
    <div>
      <span>已处理：</span>
      <span id="processed-count">0</span>
      <span>总数：</span>
      <span id="total-count">0</span>
    </div>
    <div>
      <span id="compress-message"></span>
    </div>

    <h2>数据维护</h2>
    <div>
      <button id="update-stats-btn">更新收藏夹统计</button>
    </div>
    <div>
      <span id="stats-message"></span>
    </div>

    <h2>标签数据维护</h2>
    <div>
      <button id="fetch-missing-tags-btn">重新获取收藏视频标签</button>
    </div>
    <div>
      <span>进度：</span>
      <span id="tags-status">等待开始...</span>
      <span id="tags-percent">0%</span>
    </div>
    <div>
      <span>已处理：</span>
      <span id="tags-processed-count">0</span>
      <span>总数：</span>
      <span id="tags-total-count">0</span>
    </div>
    <div>
      <span id="tags-message"></span>
    </div>

    <h2>图像数据迁移</h2>
    <div>
      <label>
        迁移类型：
        <select id="migrate-type">
          <option value="both">视频封面和创作者头像</option>
          <option value="video">仅视频封面</option>
          <option value="creator">仅创作者头像</option>
        </select>
      </label>
      <button id="migrate-images-btn">迁移图像数据</button>
    </div>
    <div>
      <span>进度：</span>
      <span id="migrate-status">等待开始...</span>
      <span id="migrate-percent">0%</span>
    </div>
    <div>
      <span>已处理：</span>
      <span id="migrate-processed-count">0</span>
      <span>总数：</span>
      <span id="migrate-total-count">0</span>
    </div>
    <div>
      <span id="migrate-message"></span>
    </div>

    <h2>标签 API 测试</h2>
    <div>
      <button id="start-tag-api-test-btn">开始测试</button>
      <button id="stop-tag-api-test-btn" disabled>停止</button>
    </div>
    <div>
      <span>进度：</span>
      <span id="tag-api-test-status">等待开始...</span>
      <span id="tag-api-test-percent">0%</span>
    </div>
    <div>
      <span>已处理：</span>
      <span id="tag-api-test-processed-count">0</span>
      <span>总数：</span>
      <span id="tag-api-test-total-count">0</span>
    </div>
    <div>
      <span id="tag-api-test-message"></span>
    </div>
    <div id="tag-api-test-results"></div>

    <h2>测试数据生成</h2>
    <div>
      <label>
        数据类型：
        <select id="test-data-type">
          <option value="all">全部数据</option>
          <option value="linked-favorites">关联收藏数据</option>
          <option value="creators">创作者</option>
          <option value="videos">视频</option>
          <option value="collections">收藏夹</option>
          <option value="collection-items">收藏项</option>
          <option value="watch-events">观看事件</option>
          <option value="tags">标签</option>
          <option value="add-tags-to-creators">为创作者添加标签</option>
        </select>
      </label>
      <label>
        数量：
        <input type="number" id="test-data-count" min="1" max="1000" value="10">
      </label>
      <button id="generate-test-data-btn">生成测试数据</button>
    </div>
    <div>
      <span>进度：</span>
      <span id="test-data-status">等待开始...</span>
      <span id="test-data-percent">0%</span>
    </div>
    <div>
      <span>已处理：</span>
      <span id="test-data-processed-count">0</span>
      <span>总数：</span>
      <span id="test-data-total-count">0</span>
    </div>
    <div>
      <span id="test-data-message"></span>
    </div>

    <h2>兴趣分析调试</h2>
    <div>
      <label>
        平台：
        <select id="interest-platform">
          <option value="bilibili">Bilibili</option>
          <option value="youtube">YouTube</option>
        </select>
      </label>
      <label>
        <input type="checkbox" id="interest-use-llm"> 使用LLM映射
      </label>
    </div>
    <div>
      <button id="init-interest-topics-btn">初始化兴趣主题</button>
      <button id="backfill-tag-mappings-btn">回填标签映射</button>
      <button id="backfill-contribution-events-btn">回填贡献事件</button>
      <button id="rebuild-snapshots-btn">重建快照</button>
      <button id="rebuild-recent-snapshots-btn">重建最近快照</button>
      <button id="init-full-interest-analysis-btn">完整初始化</button>
    </div>
    <div>
      <span>状态：</span>
      <span id="interest-status">等待操作...</span>
    </div>
    <div>
      <span id="interest-message"></span>
    </div>

    <script type="module" src="./tag-api-test.ts"></script>
    <script type="module" src="./test-tools.ts"></script>
  </body>
</html>
