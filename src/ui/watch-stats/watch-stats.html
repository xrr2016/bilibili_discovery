<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>观看统计</title>
    <link rel="stylesheet" href="./watch-stats.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>累计观看统计</h1>
        <p class="subtitle">基于播放器进度的真实观看时长统计</p>
      </header>

      <div class="layout">
        <section class="panel">
          <h2>月度热力图</h2>
          <div id="heatmap-container" class="heatmap-container"></div>
          <h2 class="chart-title">近7天趋势</h2>
          <canvas id="line-chart" class="line-chart"></canvas>
        </section>

        <section class="panel stats-panel">
          <div class="card">
            <span class="label">总观看时长</span>
            <span id="stat-total" class="value">-</span>
          </div>
          <div class="card">
            <span class="label">今日观看时长</span>
            <span id="stat-today" class="value">-</span>
          </div>
          <div class="card">
            <span class="label">近7天观看时长</span>
            <span id="stat-7days" class="value">-</span>
          </div>
          <div class="card">
            <span class="label">统计更新时间</span>
            <span id="stat-update" class="value">-</span>
          </div>
        </section>

        <section class="panel">
          <h2>UP 时长 Top 10</h2>
          <div id="up-list" class="list"></div>
        </section>

        <section class="panel">
          <h2>视频时长 Top 10</h2>
          <div id="video-list" class="list"></div>
        </section>

        <section class="panel full search-panel">
          <div class="search-layout">
            <div class="search-left">
              <h2>视频搜索</h2>
              <input type="text" id="video-search" class="search-input" placeholder="搜索视频标题...">
              <div id="video-search-results" class="list"></div>
            </div>
            <div class="search-divider"></div>
            <div class="search-right">
              <div class="filter-tags-container">
                <div class="filter-tags-section">
                  <h3>包含标签</h3>
                  <div id="filter-include-tags" class="filter-tags"></div>
                </div>
                <div class="filter-tags-section">
                  <h3>排除标签</h3>
                  <div id="filter-exclude-tags" class="filter-tags"></div>
                </div>
              </div>
              <h2>标签搜索</h2>
              <input type="text" id="tag-search" class="search-input" placeholder="搜索标签...">
              <div id="tag-search-results" class="list"></div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
