<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观看统计 - Bilibili Discovery</title>
  <link rel="stylesheet" href="watch-stats.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>观看统计</h1>
      <p class="subtitle">基于播放器进度的真实观看时长统计</p>
    </header>

    <main class="content">
      <!-- 统计卡片区域 -->
      <section class="stats-section">
        <div class="stats-grid">
          <div id="stat-total" class="stat-card-container"></div>
          <div id="stat-today" class="stat-card-container"></div>
          <div id="stat-7days" class="stat-card-container"></div>
          <div id="stat-update" class="stat-card-container"></div>
        </div>
      </section>

      <!-- 图表区域 -->
      <section class="charts-section">
        <div class="charts-grid">
          <div class="chart-panel">
            <h2 class="panel-title">观看热力图</h2>
            <div id="heatmap-container" class="heatmap-container"></div>
          </div>
          <div class="chart-panel">
            <h2 class="panel-title">近30天趋势</h2>
            <div class="line-chart-wrapper">
              <canvas id="line-chart" class="line-chart"></canvas>
            </div>
          </div>
        </div>
      </section>

      <!-- 列表区域 -->
      <section class="lists-section">
        <div class="lists-grid">
          <div class="list-panel">
            <h2 class="panel-title">UP 时长 Top 10</h2>
            <div id="up-list" class="list-container"></div>
          </div>
          <div class="list-panel">
            <h2 class="panel-title">视频时长 Top 10</h2>
            <div id="video-list" class="list-container"></div>
          </div>
        </div>
      </section>

      <!-- 兴趣分析区域 -->
      <section class="interest-section">
        <div class="interest-header">
          <h2 class="section-title">兴趣分析</h2>
          <div class="interest-controls">
            <select id="interest-window" class="window-selector">
              <option value="7d">近7天</option>
              <option value="30d">近30天</option>
            </select>
          </div>
        </div>
        <div id="interest-analysis" class="interest-analysis-container">
          <div class="interest-loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>正在分析兴趣...</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="watch-stats.ts"></script>
</body>
</html>
