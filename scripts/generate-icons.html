<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #f0f0f0;
    }
    canvas {
      margin: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Icon Generator</h1>
  <button onclick="generateIcons()">Generate Icons</button>
  <div id="output"></div>

  <script>
    function generateIcons() {
      const sizes = [16, 48, 128];
      const output = document.getElementById('output');
      output.innerHTML = '';

      sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Background circle
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#00AEEC');
        gradient.addColorStop(1, '#00B5E5');

        ctx.beginPath();
        ctx.arc(size/2, size/2, size * 0.47, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        // TV icon
        const padding = size * 0.19;
        const tvWidth = size * 0.625;
        const tvHeight = size * 0.44;
        const tvX = padding;
        const tvY = size * 0.28;
        const tvRadius = size * 0.0625;

        // TV body
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.roundRect(tvX, tvY, tvWidth, tvHeight, tvRadius);
        ctx.fill();

        // TV screen
        const screenPadding = size * 0.03;
        const screenRadius = size * 0.03;
        ctx.fillStyle = '#00AEEC';
        ctx.beginPath();
        ctx.roundRect(tvX + screenPadding, tvY + screenPadding, 
                    tvWidth - screenPadding * 2, tvHeight - screenPadding * 2, screenRadius);
        ctx.fill();

        // TV stand
        const standWidth = size * 0.25;
        const standHeight = size * 0.094;
        const standX = (size - standWidth) / 2;
        const standY = tvY + tvHeight + size * 0.03;

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.roundRect(standX, standY, standWidth, standHeight, size * 0.015);
        ctx.fill();

        // Base
        const baseWidth = size * 0.25;
        const baseHeight = size * 0.03;
        const baseX = (size - baseWidth) / 2;
        const baseY = standY + standHeight;

        ctx.beginPath();
        ctx.roundRect(baseX, baseY, baseWidth, baseHeight, size * 0.015);
        ctx.fill();

        // Play button
        const playSize = size * 0.156;
        const playX = (size - playSize) / 2;
        const playY = tvY + (tvHeight - playSize) / 2;

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.moveTo(playX + playSize * 0.2, playY);
        ctx.lineTo(playX + playSize * 0.8, playY + playSize / 2);
        ctx.lineTo(playX + playSize * 0.2, playY + playSize);
        ctx.closePath();
        ctx.fill();

        // Stars
        const star1 = { x: size * 0.75, y: size * 0.31, r: size * 0.03 };
        const star2 = { x: size * 0.25, y: size * 0.625, r: size * 0.023 };
        const star3 = { x: size * 0.78, y: size * 0.594, r: size * 0.016 };

        [star1, star2, star3].forEach(star => {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.fill();
        });

        canvas.title = `${size}x${size}`;
        output.appendChild(canvas);

        // Download link
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `icon${size}.png`;
        link.textContent = `Download ${size}x${size}`;
        link.style.display = 'block';
        link.style.margin = '10px';
        output.appendChild(link);
      });
    }
  </script>
</body>
</html>
